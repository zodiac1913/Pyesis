name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.release_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected: vYYYY.MM.DD.xx (for example: v2026.06.01.01)"
            exit 1
          fi

  build-package:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ needs.prepare.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error

  build-windows-exe:
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip -r requirements.txt pyinstaller

      - name: Build Windows exe
        run: pyinstaller --clean --noconfirm --onefile --icon assets/pyesis.ico --name Pyesis main.py

      - name: Version exe filename
        shell: pwsh
        run: |
          Copy-Item "dist/Pyesis.exe" "dist/Pyesis-${{ needs.prepare.outputs.release_tag }}.exe" -Force

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ needs.prepare.outputs.release_tag }}
          path: dist/Pyesis-${{ needs.prepare.outputs.release_tag }}.exe
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-package
      - build-windows-exe

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ needs.prepare.outputs.release_tag }}'
          path: release-assets
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: |
            release-assets/*
